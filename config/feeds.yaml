defaults:
  requestTimeoutMs: 20000
  retries: 2
  userAgent: custom-podcast-feeds/0.1

sources:
  - id: npr-music
    url: https://feeds.npr.org/510019/podcast.xml

outputs:
  - id: new-music-friday
    title: New Music Friday (Filtered)
    description: Episodes with the exact title "New Music Friday".
    link: https://www.npr.org/music/
    sources: [npr-music]
    match:
      mode: substring
      caseSensitive: false
      includeAny: ["New Music Friday"]
      excludeAny: []
    limits:
      maxItems: 200
